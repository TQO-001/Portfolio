<!DOCTYPE html>
<html>
<head>
    <title>Basic Website Layout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
        }
        
        header {
            background-color: #f0f0f0;
            padding: 20px;
            text-align: center;
        }
        
        nav {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        
        nav li {
            display: inline-block;
            margin-right: 20px;
        }
        
        nav a {
            color: #fff;
            text-decoration: none;
        }
        
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        footer {
            background-color: #f0f0f0;
            padding: 10px;
            text-align: center;
        }

        .empty {
            height: 250px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Basic Website Layout</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
    <main>
        <h2>Welcome to My website!</h2>
        <p>This is a basic layout for a website.</p>
        <div class="empty"></div>
    </main>
    <footer>
        <p>&copy; 2023 Basic Website Layout</p>
    </footer>
</body>
</html>
