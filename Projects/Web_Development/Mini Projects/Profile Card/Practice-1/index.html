<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="" content="">

    <link rel="stylesheet" href="Styles.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <title>Profile Card UI Design</title>
</head>
<body>
    <!-- Profile Card -->
    <div class="profile-card">
        <!-- Profile image: This will hold the image-->
        <div class="profile-image">
            <img src="https://placehold.co/150" alt="Profile Image" class="image">
        </div>

        <div class="text-area">
            <span class="name">Thulani Langa</span>
            <span class="job">Programmer & Network Technician</span>
        </div>

        <div class="media-buttons">
            <a href="#" class="link">
                <span>
                    <i class='bx bxl-facebook'></i>
                </span>
            </a>
            <a href="#" class="link">
                <span>
                    <i class='bx bxl-twitter'></i>
                </span>
            </a>
            <a href="#" class="link">
                <span>
                    <i class='bx bxl-instagram'></i>
                </span>
            </a>
            <a href="#" class="link">
                <span>
                    <i class='bx bxl-youtube'></i>
                </span>
            </a>
        </div>

        <div class="buttons">
            <button>Subscribe</button>
            <button>Message</button>
        </div>

        <div class="analytics">
            <span class="data">
                <i class='bx bx-heart'></i>60K
            </span>
            <span class="data">
                <i class='bx bx-comment'></i>20K
            </span>
            <span class="data">
                <i class='bx bx-share'></i>12K
            </span>
        </div>

        
    </div>
</body>
</html>
