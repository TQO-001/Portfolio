<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Profile Card">
    <meta name="keywords" content="Profile Card, Thulani Langa">
    <meta name="author" content="Thulani Langa">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="Styles.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <title>Profile Card</title>
</head>
<body>
    <div class="profile-card">
        <div class="profile-image">
            <img src="https://placehold.co/150" alt="Placeholder Image" class="image">
        </div>

        <div class="text-data">
            <h2 class="name">Thulani Langa</h2>
            <p class="job">Programmer & Network Technician</p>
        </div>

        <div class="social-media">
            <a href="#" class="socials">
                <i class='bx bxl-facebook'></i>
            </a>
            <a href="#" class="socials">
                <i class='bx bxl-twitter'></i>
            </a>
            <a href="#" class="socials">
                <i class='bx bxl-instagram'></i>
            </a>
            <a href="#" class="socials">
                <i class='bx bxl-youtube'></i>
            </a>
        </div>
        
        <div class="buttons">
            <button class="subscribe">Subscribe</button>
            <button class="message">Message</button>
        </div>

        <div class="analytics">
            <span class="data">
                <i class='bx bx-heart'></i>60k
            </span>
            <span class="data">
                <i class='bx bx-comment'></i>20k
            </span>
            <span class="data">
                <i class='bx bx-share'></i>12k
            </span>
        </div>
    </div>
</body>
</html>
