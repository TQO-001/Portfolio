<!DOCTYPE html>
<html lang="EN">
<head>
    <!-- Meta Tags for page information -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Profile Card Page">
    <meta name="keywords" content="profile card, social media, css">
    <meta name="author" content="Thulani Langa">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="Styles.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <title>Profile Card UI Design</title>
</head>
<body>
    <!-- Profile Card Section -->
    <div class="profile-card">
        <!-- Profile Image Section -->
        <div class="image">
            <img src="https://placehold.co/150" alt="placeholder profile image" class="profile-image">
        </div>

        <!-- Text Information Section -->
        <div class="text-data">
            <span class="name">Thulani Langa</span>
            <span class="job">Programmer & Network Technician</span>
        </div>

        <!-- Social Media Buttons Section -->
        <div class="media-buttons">
            <a href="#" class="link">
                <i class='bx bxl-facebook'></i>
            </a>
            <a href="#" class="link">
                <i class='bx bxl-twitter'></i>
            </a>
            <a href="#" class="link">
                <i class='bx bxl-instagram'></i>
            </a>
            <a href="#" class="link">
                <i class='bx bxl-youtube'></i>
            </a>
        </div>

        <!-- Action Buttons Section -->
        <div class="buttons">
            <button class="button">Subscribe</button>
            <button class="button">Message</button>
        </div>

        <!-- Analytics Section -->
        <div class="analytics">
            <div class="data">
                <i class="bx bx-heart"></i>
                <span class="number">60k</span>
            </div>
            <div class="data">
                <i class="bx bx-message-rounded"></i>
                <span class="number">20k</span>
            </div>
            <div class="data">
                <i class="bx bx-share"></i>
                <span class="number">12k</span>
            </div>
        </div>
    </div>
</body>
</html>
