<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Common Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HTML Forms Page">
    <meta name="keywords" content="HTML, forms, input, label, textarea, submit, reset">
    <meta name="author" content="Your Name">
    <title>HTML Forms Page</title>
    <style>
        /* Styling for form section */
        form {
            background-color: #f4f4f9;
            padding: 20px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
            width: 80%;
            max-width: 600px;
        }

        label {
            display: inline-block;
            width: 150px;
            margin-bottom: 8px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        h2, h3 {
            color: #333;
        }

        .form-container {
            padding: 20px;
        }

        .form-header {
            background-color: #dbe9fd;
            padding: 15px;
            border-radius: 5px;
        }

        .form-footer {
            background-color: #f8d7da;
            padding: 10px;
            margin-top: 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>HTML Forms Page</h1>
    </header>

    <main class="form-container">
        <!-- Contact Form Section -->
        <section id="contact-form">
            <h2>Contact Form</h2>
            <h3>Common Form Elements</h3>
            <form action="#" method="post">
                <!-- Common Form Elements -->
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your name"><br><br>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>
                
                <label for="password">Password:</label>
                <input type="password" id="password" name="password"><br><br>
                
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" min="1" max="100"><br><br>
                
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob"><br><br>
                
                <label for="gender">Gender:</label>
                <select id="gender" name="gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select><br><br>
                
                <label for="comments">Comments:</label>
                <textarea id="comments" name="comments" rows="4" cols="30" placeholder="Write your comments here"></textarea><br><br>
                
                <input type="checkbox" id="subscribe" name="subscribe">
                <label for="subscribe">Subscribe to newsletter</label><br><br>
                
                <input type="radio" id="yes" name="confirmation" value="yes">
                <label for="yes">Yes</label>
                <input type="radio" id="no" name="confirmation" value="no">
                <label for="no">No</label><br><br>
                
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">
            </form>

            <h3>Less Common Form Elements</h3>
            <form action="#" method="post">
                <!-- Less Common Form Elements -->
                <label for="file">Upload File:</label>
                <input type="file" id="file" name="file"><br><br>
                
                <label for="color">Choose a Color:</label>
                <input type="color" id="color" name="color" value="#ff0000"><br><br>
                
                <label for="range">Select Range:</label>
                <input type="range" id="range" name="range" min="0" max="100" value="50"><br><br>
                
                <label for="tel">Phone Number:</label>
                <input type="tel" id="tel" name="tel" placeholder="123-456-7890"><br><br>
                
                <label for="url">Website URL:</label>
                <input type="url" id="url" name="url" placeholder="https://example.com"><br><br>
                
                <label for="search">Search:</label>
                <input type="search" id="search" name="search" placeholder="Search here"><br><br>
                
                <input type="hidden" id="hiddenField" name="hiddenField" value="hiddenValue">
                
                <label for="datetime-local">Appointment:</label>
                <input type="datetime-local" id="datetime-local" name="datetime-local"><br><br>
                
                <label for="month">Select Month:</label>
                <input type="month" id="month" name="month"><br><br>
                
                <label for="week">Select Week:</label>
                <input type="week" id="week" name="week"><br><br>
            </form>
        </section>
    </main>

    <footer class="form-footer">
        <p>&copy; 2024 Your Name</p>
    </footer>
</body>
</html>
