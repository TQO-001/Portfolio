<!DOCTYPE html>
<html>
<head>
    <!-- Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Semantic Structure page">
    <meta name="keywords" content="header, nav, main, section, article, heading, image, paragraph, footer, links">
    <meta name="author" content="Thulani Langa">

    <!-- Link tags -->
    <link rel="Stylesheet" href="Styles.css">

    <title>Semantic Structure</title>
</head>
<body>
    <!-- Header Semantic Element -->
    <header>
        <!-- Nav Semantic Element -->
        <nav class="header-links">
            <!-- Logo image -->
            <img src="https://placehold.co/60" class="logo">
            <!-- Navigation Links -->
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Semantic Element -->
    <main>
        <section class="article-container">
            <!-- Article Semantic Element -->
            <article>
                <h1>Article Heading</h1>
                <img src="https://placehold.co/250" alt="image-placholder">
                <p>
                    This is a paragraph
                </p>
            </article>

            <!-- Article Semantic Element -->
            <article>
                <h1>Article Heading</h1>
                <img src="https://placehold.co/250" alt="image-placholder">
                <p>
                    This is a paragraph
                </p>
            </article>

            <!-- Article Semantic Element -->
            <article>
                <h1>Article Heading</h1>
                <img src="https://placehold.co/250" alt="image-placholder">
                <p>
                    This is a paragraph
                </p>
            </article>
        </section>

        <!-- Forms -->
        <section class="form-container">
            <form action="/">
                <!-- Name -->
                <label for="name">Name: </label>
                <input type="name" id="name" name="name" placeholder="Enter Name Here">
                <br><br>

                <!-- Email -->
                <label for="email">Email: </label>
                <input type="email" id="email" name="email" placeholder="example@email.com">
                <br><br>

                <!-- Password -->
                <label for="password">Password: </label>
                <input type="password" id="password" name="password">
                <br><br>

                <!-- Name -->
                <label for="country">Pick a Country: </label>
                <select name="country" id="country">
                    <option>South Africa</option>
                    <option>America</option>
                    <option>Europe</option>
                    <option>China</option>
                    <option>Japan</option>
                </select>
                <br><br>

                <input type="checkbox" id="t&cs" name="t&cs" required>
                <label value="t&cs" >Accept Terms and Conditions</label>
                <br><br>

                <button value="submit">Submit</button>
            </form>
        </section>
    </main>

    <div class="empty"></div>

    <footer>
        <section class="footer-links">
            <!-- Logo image -->
            <img src="https://placehold.co/60" class="footer-logo">
            <!-- Footer Navigation Links -->
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
        </section>
        <section>
            <ul>
                <li>
                    <a href="#">
                        <img src="https://placehold.co/50" alt="social-media-icon">
                        facebook
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="https://placehold.co/50" alt="social-media-icon">
                        instagram
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="https://placehold.co/50" alt="social-media-icon">
                        twitter
                    </a>
                </li>
            </ul>
        </section>
        <p>
            &copy; Copyright Thulani Langa 2024
        </p>
    </footer>
</body>
</html>
