<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Elements</title>
</head>
<body>
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>

    <p>
        This is a paragraph
    </p>

    <p>
        <strong>Bold</strong> text<br>
        <em>Italic</em> text<br>
        <small>Small</small> text<br>
        <mark>Highlighted</mark> text<br>
        <del>Deleted</del> text<br>
        <ins>Inserted</ins> text<br>
        <sup>Superscript</sup> text<br>
        <sub>Subscript</sub> text<br>
    </p>
</body>
</html>
