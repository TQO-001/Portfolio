<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta Information -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables & Forms</title>
</head>
<body>

    <!-- Tables Section -->
    <h1>Tables</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Header 1</th>
                <th>Header 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Row 1, Cell 1</td>
                <td>Row 1, Cell 2</td>
            </tr>
            <tr>
                <td>Row 2, Cell 1</td>
                <td>Row 2, Cell 2</td>
            </tr>
        </tbody>
    </table>
    <br>

    <!-- Form Section -->
    <form action="/submit-form" method="post">
        
        <!-- Name Field -->
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter Name Here" required>
        <br><br>

        <!-- Surname Field -->
        <label for="surname">Surname:</label>
        <input type="text" id="surname" name="surname" placeholder="Enter Surname Here" required>
        <br><br>

        <!-- Email Field -->
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" placeholder="example@domain.com" required>
        <br><br>

        <!-- Password Field -->
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Password" required>
        <br><br>

        <!-- Number Field -->
        <label for="number">Number: </label>
        <input type="number" id="number" name="number" placeholder="Number">
        <br><br>

        <!-- Date Field -->
        <label for="date">Date:</label>
        <input type="date" id="date" name="date">
        <br><br>

        <!-- Checkbox Field -->
        <label for="checkbox">Checkbox</label>
        <input type="checkbox" id="checkbox" name="checkbox"> Check Me
        <br><br>

        <!-- Radio Buttons for Gender Selection -->
        <label for="gender">Select Gender:</label>
        <input type="radio" id="male" name="gender" value="male"> Male
        <input type="radio" id="female" name="gender" value="female"> Female
        <br><br>

        <!-- File Upload -->
        <label for="file">Insert File:</label>
        <input type="file" id="file" name="file">
        <br><br>

        <!-- Form Buttons -->
        <input type="reset" value="Reset">
            <br><br>
            <input type="button" value="Click me">
            <br><br>
            <input type="submit" id="submit" value="Submit">
    </fo    <br><br>
    rm>

</body>
</html>
