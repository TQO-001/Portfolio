<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>Tables & Forms</title>
</head>
<body>
    <h1>Tables</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Header 1</th>
                <th>Header 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Row 1, Cell 1</td>
                <td>Row 1, Cell 2</td>
            </tr>
            <tr>
                <td>Row 2, Cell 1</td>
                <td>Row 2, Cell 2</td>
            </tr>
        </tbody>
    </table>
    <br>

    <form action="/submit-data">
        <!-- NAME -->
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="John">
        <br><br>

        <!-- SURNAME -->
        <label for="surname">Surname:</label>
        <input type="text" id="surname" name="surname" placeholder="Doe">
        <br><br>

        <!-- EMAIL -->
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" placeholder="example@domain.com">
        <br><br>
        
        <!-- PASSWORD -->
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Password" required>
        <br><br>
        
        <!-- NUMBER -->
        <label for="number">Number:</label>
        <input type="number" id="number" name="number" placeholder="Number">
        <br><br>

        <!-- DATE -->
        <label for="date">Date:</label>
        <input type="date" id="date" name="date">
        <br><br>

        <!-- Check Box's -->
        <h3>Pick a favourite food</h3>
    
        <input type="checkbox" id="checkbox-1" name="checkbox" checked>
        <label for="checkbox-1">Pizza</label>
        <br>
        <input type="checkbox" id="checkbox-2" name="checkbox">
        <label for="checkbox-2">Burger</label>
        <br>
        <input type="checkbox" id="checkbox-3" name="checkbox">
        <label for="checkbox-3">Hotdog</label>
        <br>
        <input type="checkbox" id="checkbox-4" name="checkbox">
        <label for="checkbox-4">Fries</label>
        <br>

        <!-- Radio Box's -->
        <h3>Select Gender</h3>
        <input type="radio" id="gender-radio-male" name="radio">
        <label for="gender-radio-male">Male</label><br>
        <input type="radio" id="gender-radio-female" name="radio">
        <label for="gender-radio-female">Female</label><br>
        <br>

        <!-- File input -->
        <label for="file">Insert File:</label>
        <input type="file" name="file" id="file"><br>
        <br>

        <!-- Reset Form -->
        <button type="reset">Reset</button>
        <br><br>

        <!-- Submit Form -->
        <button type="submit">Submit</button>
        <br><br>

    </form>


    <div style="height: 300px; width: 100%;"></div>
</body>
</html>
