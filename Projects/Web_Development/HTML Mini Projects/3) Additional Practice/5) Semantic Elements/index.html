<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Elements</title>
</head>
<body>
    <!-- Semantic Elements -->
    <header>
        <!-- Header content -->
        <p>Header Content</p>
        <nav>
            <!-- Navigation links -->
            <p>Logo</p>
            <p>Navigation Links</p>
        </nav>
    </header>
    
    <main>
        <!-- Main content -->
        <p>Main Content</p>
    </main>

    <article>
        <!-- Article content -->
        <p>Article Content</p>
    </article>

    <section>
        <!-- Section content -->
        <p>Section Content</p>
    </section>

    <aside>
        <!-- Sidebar content -->
        <p>Sidebar Content</p>
    </aside>

    <footer>
        <!-- Footer content -->
        <p>Footer Content</p>
    </footer>
</body>
</html>
