<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block & Inline Elements</title>
</head>
<body>
    <header>
        <!-- This is a block element -->
        <p>header block element</p>
    </header>

    <div>
        <!-- This is a block element -->
        <p>div block element</p>
        
        <div>
            <!--These are inline elements-->
            <span>span inline element</span><br>
            <a href="#">a(link) inline element</a><br>
            <strong>strong inline element</strong><br>
            <em>emphasis inline element</em><br>
        </div>
    </div>
    
    <article>
        <!-- This is a block element -->
        <p>article block element</p>
    </article>

    <section>
        <!-- This is a block element -->
        <p>section block element</p>
    </section>

    <footer>
        <!-- This is a block element -->
        <p>footer block element</p>
    </footer>
</body>
</html>
