<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block & Inline Elements</title>
</head>
<body>
    <!--Header block element-->
    <header>
        <p>Header block element</p>
    </header>

    <!-- div block element -->
    <div>
        <p>div block element</p>

        <!-- span inline element -->
        <span>
            <p>span inline element</p>
        </span>

        <!-- a(link) inline element -->
        <a href="#">a(link) inline element</a>
        <br>
        
        <!-- strong inline element -->
        <strong>strong inline element</strong>
        <br>
        
        <!-- emphasis inline element -->
        <em>emphasis inline element</em>
        <br>
        
        <!-- article block element -->
        <article>
            <p>article block element</p>
        </article>

        <!-- section block element -->
        <section>
            <p>section block element</p>
        </section>
    </div>

    <!-- footer block element -->
    <footer>
        <p>footer block element</p>
    </footer>

</body>
</html>
