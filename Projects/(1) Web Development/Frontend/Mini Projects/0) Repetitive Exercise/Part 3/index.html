<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Media Elements - Audio, Video, Iframe, and Images">
    <meta name="keywords" content="HTML, Media, Audio, Video, Iframe, Images">
    <meta name="author" content="Your Name">
    <title>Media Elements</title>
</head>
<body>
    <header>
        <h1>Media Elements</h1>
    </header>

    <main>
        <section>
            <h2>Audio Example</h2>
            <audio controls>
                <source src="audio.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </section>

        <section>
            <h2>Video Example</h2>
            <video controls width="600">
                <source src="video.mp4" type="video/mp4">
                Your browser does not support the video element.
            </video>
        </section>

        <section>
            <h2>Embedding an Iframe</h2>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/example" frameborder="0" allowfullscreen></iframe>

            <h2>Embedding a Map</h2>
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!..." 
                width="600" 
                height="450" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </section>

        <section>
            <h2>Image Example</h2>
            <img src="example.jpg" alt="Example Image" width="300">
        </section>
    </main>
</body>
</html>
